  <body>

<script>
function myFunction() {
  const transferId = document.getElementById('transferId').value;
  $.ajax({
            headers: {
              'Accept': 'application/json',
              'Content-Type': 'application/json'
            },
            type: 'POST',
            url: 'https://cbridge-prod2.celer.network/v2/getTransferStatus',
            dataType: 'json',
            data: `{"transferId": "${transferId}"}`,
            contentType : 'application/json',
            success: function(data) {
              console.log("data", data)
                if ([3,4].includes(data.status)) {
                    document.getElementById('status').innerText='pending'
                } else if (data.status === 5) {
                    document.getElementById('status').innerText='completed'
                } else if (data.status === 6) {
                    document.getElementById('status').innerText='refund'
                } else if ([7,8,9].includes(data.status)) {
                  document.getElementById('status').innerText='processing refund'
                } else if (data.status === 10) {
                  document.getElementById('status').innerText='refund completed'
                } else if (data.status === 0) {
                  document.getElementById('status').innerText='transfer not found'
                } else if (data.status === 1) {
                  document.getElementById('status').innerText='transfer not yet confirmed on chain'
                } else if (data.status === 2) {
                  document.getElementById('status').innerText='transfer failed'
                } else {
                    document.getElementById('status').innerText='error'
                }
            }
        })
}
</script>
    <form id="register_form">
      <input name="transferId" id="transferId">
    </form>
    <div onclick="myFunction()">Get Status</div>
    <div id='status'></div>
  </body>
</html>
